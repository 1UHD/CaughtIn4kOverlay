<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CaughtIn4k Overlay</title>
    <link rel="stylesheet" href="index.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script defer src="titlebar.js"></script>
  </head>
  <body>
    <div class="titlebar">
      <img src="assets/logo.png" alt="Logo" width="30px" height="30px">
      <div class="title"><b>CaughtIn4k</b></div>
      <div class="controls">
        <button class="controlbutton minimizebutton", id="buttonminimize">–</button>
        <button class="controlbutton closebutton" id="buttonclose">X</button>
      </div>
    </div>
    <div class="content">
      <div class="sidebar">
        <!--<img src="assets/logo2fixed2.png" width="200px" height="66px">-->
        <div class="play">
          <ul>
            <li><button class="button statsbutton" id="bstats"><i class="fa fa-home"></i> Stats</button></li>
            <li><button class="button searchbutton" id="bsearch"><i class="fa fa-search"></i> Search</button></li>
          </ul>
        </div>
        <div class="settings">
          <ul>
            <li><button class="button gamemodebutton" id="bgamemode"><i class="fa fa-rocket"></i> BedWars</button></li>
            <li><button class="button settingsbutton" id="bsettings"><i class="fa fa-gear"></i> Settings</button></li>
          </ul>
        </div>
        <div class="profile">
          <ul>
            <li><button class="button profilebutton" id="bsession"><i class="fa fa-user"></i> Session</button></li>
            <li><button class="button clientbutton" id="bclient"><i class="fa fa-folder"></i> Lunar Client</button></li>
          </ul>
        </div>
      </div>
      <div class="mainframe">
        <div class="pstats">
          <h1><i class="fa fa-home"></i> Stats</h1>
        </div>
        <div class="psearch">
          <h1><i class="fa fa-search"></i> Search</h1>
        </div>
        <div class="pgamemode">
          <h1><i class="fa fa-rocket"></i> Game Mode</h1>
          <div class="gamemode_options">
            <ul>
              <li><p>Change Gamemode:</p></li>
              <div class="gamemode_dropdown"
                <li><button class="gamemode_dropdown_button" id="gamemode_dropdown_button">None</button></li>
                <div class="gamemode_dropdown_options">
                  <ul>
                    <li><button class="gamemode_dropdown_option_bedwars", id="gamemode_dropdown_option_bedwars">BedWars</button></li>
                    <li><button class="gamemode_dropdown_option_skywars", id="gamemode_dropdown_option_skywars">SkyWars</button></li>
                  </ul>
                </div>
              </div>
            </ul>
          </div>
        </div>  
        <div class="psettings">
          <h1><i class="fa fa-gear"></i> Settings</h1>
          <div class="settings_options">
            <ul>
              <li><div class="settings_options_visuals">
                <b>VISUAL SETTINGS</b>
                <ul>
                  <li><p id="settings_options_visuals_alpha">Background Alpha [0]:</p></li>
                  <li><input type="range" id="settings_options_visuals_bgalpha_drawbar" min="0" max="10" step="1" value="10"/></li>
                </ul>
              </div></li>
            </ul>
          </div>
        </div> 
        <div class="psession">
          <h1><i class="fa fa-user"></i> Session</h1>
        </div>
        <div class="pclient">
          <h1><i class="fa fa-folder"></i> Client</h1>
        </div>
      </div>
    </div>
    <script src="titlebar.js"></script>
    <script src="helper.js"></script>
  </body>
</html>
